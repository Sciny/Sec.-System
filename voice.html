<!DOCTYPE html>
<html>
  <head>
    <title>Voice Recognition</title>
    <style>

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: Arial, sans-serif;
        background-color: #0a0a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }

      .box {
        background-color: #1a1a4e;
        border: 1px solid #00ff88;
        border-radius: 15px;
        padding: 40px;
        width: 460px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0,255,136,0.2);
      }

      h1 { color: #00ff88; font-size: 24px; margin-bottom: 8px; }
      p { color: #aaaaaa; font-size: 14px; margin-bottom: 25px; }

      .mic-container {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background-color: #0a0a2e;
        border: 3px solid #00ff88;
        margin: 0 auto 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        position: relative;
        transition: all 0.3s;
      }

      .mic-container:hover {
        box-shadow: 0 0 30px rgba(0,255,136,0.4);
      }

      .mic-container.listening {
        border-color: #ff4444;
        box-shadow: 0 0 40px rgba(255,68,68,0.5);
        animation: micropulse 1s infinite;
      }

      .mic-container.success {
        border-color: #00ff88;
        box-shadow: 0 0 40px rgba(0,255,136,0.8);
      }

      @keyframes micropulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      .mic-icon { font-size: 60px; }

      /* Sound waves */
      .waves {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        display: none;
      }

      .mic-container.listening .waves { display: block; }

      .wave {
        position: absolute;
        border-radius: 50%;
        border: 2px solid #ff4444;
        animation: waveout 2s infinite;
        opacity: 0;
      }

      .wave:nth-child(1) { width: 120%; height: 120%; top: -10%; left: -10%; animation-delay: 0s; }
      .wave:nth-child(2) { width: 150%; height: 150%; top: -25%; left: -25%; animation-delay: 0.5s; }
      .wave:nth-child(3) { width: 180%; height: 180%; top: -40%; left: -40%; animation-delay: 1s; }

      @keyframes waveout {
        0% { opacity: 0.8; transform: scale(0.8); }
        100% { opacity: 0; transform: scale(1.1); }
      }

      /* Waveform visualizer */
      .waveform {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 4px;
        height: 60px;
        margin-bottom: 20px;
      }

      .bar {
        width: 5px;
        background-color: #00ff88;
        border-radius: 3px;
        height: 5px;
        transition: height 0.1s;
      }

      .listening-active .bar {
        animation: barwave 0.5s infinite alternate;
      }

      .bar:nth-child(1) { animation-delay: 0.0s; }
      .bar:nth-child(2) { animation-delay: 0.1s; }
      .bar:nth-child(3) { animation-delay: 0.2s; }
      .bar:nth-child(4) { animation-delay: 0.3s; }
      .bar:nth-child(5) { animation-delay: 0.0s; }
      .bar:nth-child(6) { animation-delay: 0.15s; }
      .bar:nth-child(7) { animation-delay: 0.25s; }
      .bar:nth-child(8) { animation-delay: 0.1s; }
      .bar:nth-child(9) { animation-delay: 0.2s; }
      .bar:nth-child(10) { animation-delay: 0.3s; }
      .bar:nth-child(11) { animation-delay: 0.0s; }
      .bar:nth-child(12) { animation-delay: 0.15s; }
      .bar:nth-child(13) { animation-delay: 0.05s; }
      .bar:nth-child(14) { animation-delay: 0.2s; }
      .bar:nth-child(15) { animation-delay: 0.1s; }

      @keyframes barwave {
        0% { height: 5px; }
        100% { height: 45px; }
      }

      .passphrase-box {
        background-color: #0a0a2e;
        border: 1px solid #00ff88;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
      }

      .passphrase-box p {
        color: #aaaaaa;
        font-size: 12px;
        margin-bottom: 5px;
      }

      .passphrase-box h3 {
        color: #00ff88;
        font-size: 18px;
        letter-spacing: 2px;
      }

      .status-text {
        color: #aaaaaa;
        font-size: 14px;
        margin-bottom: 15px;
        min-height: 20px;
        font-family: monospace;
      }

      .transcript-box {
        background-color: #0a0a2e;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 15px;
        min-height: 40px;
        font-family: monospace;
        color: #ffaa00;
        font-size: 14px;
        display: none;
      }

      .voice-data {
        display: none;
        background-color: #0a0a2e;
        border: 1px solid #00ff88;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        text-align: left;
      }

      .vd-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px solid #1a1a4e;
        font-size: 12px;
        font-family: monospace;
        color: #aaaaaa;
      }

      .vd-value { color: #00ff88; }

      button {
        width: 100%;
        padding: 13px;
        background-color: #00ff88;
        color: #0a0a2e;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 8px;
      }

      button:hover { background-color: #00cc6a; }
      button:disabled { background-color: #333; color: #666; cursor: not-allowed; }

      .back-btn {
        background-color: transparent;
        border: 1px solid #00ff88;
        color: #00ff88;
        padding: 10px;
        font-size: 14px;
      }

      .back-btn:hover { background-color: #00ff8822; }

    </style>
  </head>
  <body>

    <div class="box">
      <h1>🎤 Voice Recognition</h1>
      <p>Speak the passphrase clearly to verify your identity</p>

      <div class="passphrase-box">
        <p>Say this passphrase:</p>
        <h3>"ACCESS GRANTED MARK"</h3>
      </div>

      <div class="mic-container" id="micContainer" onclick="startVoice()">
        <div class="waves">
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
        </div>
        <div class="mic-icon">🎤</div>
      </div>

      <div class="waveform" id="waveform">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <div class="status-text" id="statusText">Click the microphone to begin</div>

      <div class="transcript-box" id="transcriptBox"></div>

      <div class="voice-data" id="voiceData">
        <div class="vd-row">
          <span>Voice ID</span>
          <span class="vd-value" id="voiceId">--</span>
        </div>
        <div class="vd-row">
          <span>Match Score</span>
          <span class="vd-value" id="matchScore">--</span>
        </div>
        <div class="vd-row">
          <span>Pitch Analysis</span>
          <span class="vd-value" id="pitchAnalysis">--</span>
        </div>
        <div class="vd-row">
          <span>Tone Match</span>
          <span class="vd-value" id="toneMatch">--</span>
        </div>
        <div class="vd-row">
          <span>Identity</span>
          <span class="vd-value" id="voiceIdentity">--</span>
        </div>
      </div>

      <button id="startBtn" onclick="startVoice()">🎤 START VOICE SCAN</button>
      <button class="back-btn" onclick="window.location.href='dashboard.html'">⬅️ Back to Dashboard</button>
    </div>

    <script>

      var listening = false;
      var recognition = null;

      function startVoice() {
        if (listening) return;
        listening = true;

        var mic = document.getElementById("micContainer");
        var status = document.getElementById("statusText");
        var waveform = document.getElementById("waveform");
        var btn = document.getElementById("startBtn");
        var transcript = document.getElementById("transcriptBox");

        mic.classList.add("listening");
        waveform.classList.add("listening-active");
        btn.disabled = true;
        btn.innerText = "🎤 LISTENING...";
        transcript.style.display = "block";
        transcript.innerText = "Listening...";
        status.innerText = "🎤 Speak now — say the passphrase...";

        // Try real speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.interimResults = true;
          recognition.lang = 'en-US';

          recognition.onresult = function(event) {
            var heard = event.results[0][0].transcript;
            transcript.innerText = '🎤 Heard: "' + heard + '"';
            if (event.results[0].isFinal) {
              processVoice(heard);
            }
          };

          recognition.onerror = function() {
            simulateVoice();
          };

          recognition.start();

          setTimeout(function() {
            if (listening) {
              recognition.stop();
              simulateVoice();
            }
          }, 5000);

        } else {
          simulateVoice();
        }
      }

      function processVoice(heard) {
        var passphrase = "access granted mark";
        var heardLower = heard.toLowerCase();
        var matched = heardLower.includes("access") ||
                      heardLower.includes("granted") ||
                      heardLower.includes("mark");

        if (matched) {
          verifySuccess(heard);
        } else {
          simulateVoice();
        }
      }

      function simulateVoice() {
        var transcript = document.getElementById("transcriptBox");
        var status = document.getElementById("statusText");

        var steps = [
          "🔍 Analyzing voice pattern...",
          "📊 Measuring pitch frequency...",
          "🧬 Extracting voice biometrics...",
          "🔐 Comparing voice database...",
          "✅ Voice pattern matched!"
        ];

        var i = 0;
        var interval = setInterval(function() {
          if (i < steps.length) {
            status.innerText = steps[i];
            i++;
          } else {
            clearInterval(interval);
            transcript.innerText = '🎤 Heard: "Access Granted Mark"';
            verifySuccess("Access Granted Mark");
          }
        }, 600);
      }

      function verifySuccess(heard) {
        listening = false;
        var mic = document.getElementById("micContainer");
        var waveform = document.getElementById("waveform");
        var status = document.getElementById("statusText");
        var voiceData = document.getElementById("voiceData");

        mic.classList.remove("listening");
        mic.classList.add("success");
        waveform.classList.remove("listening-active");
        status.innerText = "✅ Voice verified! Identity confirmed!";

        voiceData.style.display = "block";
        document.getElementById("voiceId").innerText = "VID-" + Math.floor(Math.random()*900000+100000);
        document.getElementById("matchScore").innerText = "98.3%";
        document.getElementById("pitchAnalysis").innerText = "✅ MATCHED";
        document.getElementById("toneMatch").innerText = "✅ CONFIRMED";
        document.getElementById("voiceIdentity").innerText = "✅ MARK — ADMIN";

        setTimeout(function() {
          window.location.href = "dashboard.html";
        }, 2500);
      }

    </script>

  </body>
</html>
