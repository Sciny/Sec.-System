<!DOCTYPE html>
<html>
  <head>
    <title>Loading...</title>
    <style>

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #0a0a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }

      .logo {
        font-size: 60px;
        margin-bottom: 20px;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }

      h1 {
        color: #00ff88;
        font-size: 28px;
        margin-bottom: 10px;
        letter-spacing: 3px;
      }

      p {
        color: #aaaaaa;
        font-size: 14px;
        margin-bottom: 40px;
      }

      .bar-container {
        width: 300px;
        height: 6px;
        background-color: #1a1a4e;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .bar-fill {
        height: 100%;
        width: 0%;
        background-color: #00ff88;
        border-radius: 3px;
        animation: load 3s forwards;
      }

      @keyframes load {
        0% { width: 0%; }
        100% { width: 100%; }
      }

      .status-text {
        color: #00ff88;
        font-size: 13px;
        letter-spacing: 2px;
      }

      .dots {
        display: inline-block;
        animation: dots 1.5s infinite;
      }

      @keyframes dots {
        0% { content: "."; }
        33% { content: ".."; }
        66% { content: "..."; }
      }

    </style>
  </head>
  <body>

    <div class="logo">🔐</div>
    <h1>SECURE SYSTEM</h1>
    <p>Initializing security protocols...</p>

    <div class="bar-container">
      <div class="bar-fill"></div>
    </div>

    <div class="status-text" id="statusText">LOADING<span class="dots">...</span></div>

    <script>
      var messages = [
        "Checking security modules...",
        "Initializing firewall...",
        "Loading encryption...",
        "Verifying system integrity...",
        "System ready!"
      ];

      var i = 0;
      var interval = setInterval(function() {
        if (i < messages.length) {
          document.getElementById("statusText").innerHTML = messages[i];
          i++;
        } else {
          clearInterval(interval);
        }
      }, 600);

      // Redirect to login after 3 seconds
      setTimeout(function() {
        window.location.href = "index.html";
      }, 3000);
    </script>

  </body>
</html>
