<!DOCTYPE html>
<html>
  <head>
    <title>Fingerprint Scanner</title>
    <style>

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: Arial, sans-serif;
        background-color: #0a0a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }

      .box {
        background-color: #1a1a4e;
        border: 1px solid #00ff88;
        border-radius: 15px;
        padding: 40px;
        width: 400px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0,255,136,0.2);
      }

      h1 { color: #00ff88; font-size: 24px; margin-bottom: 8px; }
      p { color: #aaaaaa; font-size: 14px; margin-bottom: 30px; }

      .scanner {
        width: 180px;
        height: 180px;
        border: 3px solid #00ff88;
        border-radius: 20px;
        margin: 0 auto 25px;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        background-color: #0a0a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s;
      }

      .scanner:hover { box-shadow: 0 0 30px rgba(0,255,136,0.5); }

      .scanner.scanning {
        border-color: #ffaa00;
        box-shadow: 0 0 30px rgba(255,170,0,0.5);
      }

      .scanner.success {
        border-color: #00ff88;
        box-shadow: 0 0 40px rgba(0,255,136,0.8);
      }

      .scanner.failed {
        border-color: #ff4444;
        box-shadow: 0 0 30px rgba(255,68,68,0.5);
      }

      .fingerprint-svg {
        width: 120px;
        height: 120px;
        opacity: 0.3;
        transition: opacity 0.3s;
      }

      .scanner.scanning .fingerprint-svg { opacity: 0.7; }
      .scanner.success .fingerprint-svg { opacity: 1; }

      .scan-line {
        position: absolute;
        width: 100%;
        height: 3px;
        background: linear-gradient(to right, transparent, #00ff88, transparent);
        top: 0;
        display: none;
        animation: scanline 1.5s linear infinite;
      }

      .scanner.scanning .scan-line { display: block; }

      @keyframes scanline {
        0% { top: 0%; }
        100% { top: 100%; }
      }

      .status-text {
        color: #aaaaaa;
        font-size: 15px;
        margin-bottom: 20px;
        min-height: 25px;
      }

      .progress-bar {
        width: 100%;
        height: 6px;
        background-color: #0a0a2e;
        border-radius: 3px;
        margin-bottom: 20px;
        overflow: hidden;
        display: none;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background-color: #00ff88;
        border-radius: 3px;
        transition: width 0.1s;
      }

      button {
        width: 100%;
        padding: 13px;
        background-color: #00ff88;
        color: #0a0a2e;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover { background-color: #00cc6a; }
      button:disabled { background-color: #333; color: #666; cursor: not-allowed; }

      .dots {
        display: inline-block;
        animation: dotanim 1s infinite;
      }

      @keyframes dotanim {
        0% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
      }

    </style>
  </head>
  <body>

    <div class="box">
      <h1>🖐️ Fingerprint Scanner</h1>
      <p>Place your finger on the scanner to verify your identity</p>

      <div class="scanner" id="scanner" onclick="startScan()">
        <div class="scan-line"></div>
        <svg class="fingerprint-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 10 C30 10 15 25 15 45 C15 65 25 80 35 88" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M50 10 C70 10 85 25 85 45 C85 65 75 80 65 88" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M30 40 C30 28 38 20 50 20 C62 20 70 28 70 40 C70 55 62 68 50 75 C38 68 30 55 30 40Z" stroke="#00ff88" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M38 42 C38 34 43 29 50 29 C57 29 62 34 62 42 C62 52 57 60 50 65 C43 60 38 52 38 42Z" stroke="#00ff88" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M45 44 C45 40 47 37 50 37 C53 37 55 40 55 44 C55 50 53 55 50 58 C47 55 45 50 45 44Z" stroke="#00ff88" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="50" cy="44" r="3" fill="#00ff88" opacity="0.5"/>
        </svg>
      </div>

      <div class="status-text" id="statusText">👆 Click the scanner to begin</div>

      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <button id="scanBtn" onclick="startScan()">🖐️ SCAN FINGERPRINT</button>
    </div>

    <script>

      var scanning = false;
      var progress = 0;
      var progressInterval;

      function startScan() {
        if (scanning) return;
        scanning = true;

        var scanner = document.getElementById("scanner");
        var statusText = document.getElementById("statusText");
        var progressBar = document.getElementById("progressBar");
        var progressFill = document.getElementById("progressFill");
        var btn = document.getElementById("scanBtn");

        scanner.className = "scanner scanning";
        progressBar.style.display = "block";
        btn.disabled = true;
        progress = 0;

        var messages = [
          "🔍 Detecting fingerprint...",
          "📊 Analyzing ridge patterns...",
          "🔐 Matching biometric data...",
          "✅ Verifying identity..."
        ];
        var msgIndex = 0;
        statusText.innerText = messages[0];

        var msgInterval = setInterval(function() {
          msgIndex++;
          if (msgIndex < messages.length) {
            statusText.innerText = messages[msgIndex];
          }
        }, 800);

        progressInterval = setInterval(function() {
          progress += 2;
          progressFill.style.width = progress + "%";

          if (progress >= 100) {
            clearInterval(progressInterval);
            clearInterval(msgInterval);
            scanner.className = "scanner success";
            statusText.innerText = "✅ Fingerprint verified successfully!";
            progressFill.style.backgroundColor = "#00ff88";

            setTimeout(function() {
              window.location.href = "dashboard.html";
            }, 1500);
          }
        }, 60);
      }

    </script>

  </body>
</html>
