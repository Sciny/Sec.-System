<!DOCTYPE html>
<html>
  <head>
    <title>LOCKDOWN</title>
    <style>

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: Arial, sans-serif;
        background-color: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        overflow: hidden;
      }

      .strobe {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: #ff0000;
        opacity: 0;
        animation: strobe 1s infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes strobe {
        0% { opacity: 0; }
        10% { opacity: 0.15; }
        20% { opacity: 0; }
        30% { opacity: 0.15; }
        40% { opacity: 0; }
        100% { opacity: 0; }
      }

      .box {
        background-color: #1a0000;
        border: 2px solid #ff4444;
        border-radius: 15px;
        padding: 40px;
        width: 500px;
        text-align: center;
        box-shadow: 0 0 50px rgba(255,0,0,0.4);
        position: relative;
        z-index: 1;
      }

      .warning-icon {
        font-size: 80px;
        animation: pulse 0.5s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }

      h1 {
        color: #ff4444;
        font-size: 36px;
        letter-spacing: 5px;
        margin: 15px 0 5px;
        animation: flicker 2s infinite;
      }

      @keyframes flicker {
        0% { opacity: 1; }
        92% { opacity: 1; }
        93% { opacity: 0.3; }
        94% { opacity: 1; }
        96% { opacity: 0.3; }
        100% { opacity: 1; }
      }

      .subtitle {
        color: #ff8888;
        font-size: 14px;
        letter-spacing: 3px;
        margin-bottom: 30px;
      }

      .countdown-box {
        background-color: #0a0000;
        border: 1px solid #ff4444;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 25px;
      }

      .countdown-box p {
        color: #ff8888;
        font-size: 13px;
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      .countdown {
        color: #ff4444;
        font-size: 60px;
        font-weight: bold;
        font-family: monospace;
        letter-spacing: 5px;
      }

      .status-list {
        text-align: left;
        margin-bottom: 25px;
      }

      .status-list div {
        color: #ff8888;
        font-size: 13px;
        padding: 6px 0;
        border-bottom: 1px solid #330000;
        display: flex;
        justify-content: space-between;
      }

      .destroying { color: #ff4444; animation: blink 0.5s infinite; }

      @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
      }

      .cancel-btn {
        width: 100%;
        padding: 15px;
        background-color: #ff4444;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }

      .cancel-btn:hover { background-color: #cc0000; }

      .back-btn {
        width: 100%;
        padding: 12px;
        background-color: transparent;
        border: 1px solid #ff4444;
        color: #ff4444;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .back-btn:hover { background-color: #ff444422; }

      .cancelled {
        display: none;
        color: #00ff88;
        font-size: 20px;
        margin-top: 15px;
        font-weight: bold;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background-color: #330000;
        border-radius: 4px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background-color: #ff4444;
        border-radius: 4px;
        width: 100%;
        transition: width 1s linear;
      }

    </style>
  </head>
  <body>

    <div class="strobe"></div>

    <div class="box">
      <div class="warning-icon">☢️</div>
      <h1>⚠ LOCKDOWN ⚠</h1>
      <div class="subtitle">SYSTEM SELF-DESTRUCT INITIATED</div>

      <div class="countdown-box">
        <p>SELF-DESTRUCT IN</p>
        <div class="countdown" id="countdown">30</div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="status-list">
        <div>
          <span>🔥 Erasing user data</span>
          <span class="destroying" id="s1">DESTROYING...</span>
        </div>
        <div>
          <span>💣 Wiping access logs</span>
          <span class="destroying" id="s2">DESTROYING...</span>
        </div>
        <div>
          <span>🔐 Locking all systems</span>
          <span class="destroying" id="s3">DESTROYING...</span>
        </div>
        <div>
          <span>📡 Cutting network access</span>
          <span class="destroying" id="s4">DESTROYING...</span>
        </div>
        <div>
          <span>☢️ Initiating core wipe</span>
          <span class="destroying" id="s5">STANDBY...</span>
        </div>
      </div>

      <button class="cancel-btn" id="cancelBtn" onclick="cancelLockdown()">
        🛑 CANCEL SELF-DESTRUCT
      </button>
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        ⬅️ Back to Dashboard
      </button>

      <div class="cancelled" id="cancelledMsg">
        ✅ LOCKDOWN CANCELLED — System Secured!
      </div>
    </div>

    <script>

      var seconds = 30;
      var cancelled = false;
      var countdownInterval;

      function updateStatus(seconds) {
        if (seconds <= 25) document.getElementById("s1").innerText = "WIPING...";
        if (seconds <= 20) document.getElementById("s2").innerText = "WIPING...";
        if (seconds <= 15) document.getElementById("s3").innerText = "LOCKED ✓";
        if (seconds <= 10) document.getElementById("s4").innerText = "CUT ✓";
        if (seconds <= 5) {
          document.getElementById("s5").innerText = "INITIATING...";
          document.getElementById("s5").style.color = "#ff0000";
        }
      }

      countdownInterval = setInterval(function() {
        if (cancelled) return;
        seconds--;
        document.getElementById("countdown").innerText = String(seconds).padStart(2, "0");
        var pct = (seconds / 30) * 100;
        document.getElementById("progressFill").style.width = pct + "%";
        updateStatus(seconds);

        if (seconds <= 0) {
          clearInterval(countdownInterval);
          document.getElementById("countdown").innerText = "00";
          document.getElementById("cancelBtn").disabled = true;
          document.getElementById("cancelBtn").innerText = "💥 SYSTEM DESTROYED";
          document.getElementById("cancelBtn").style.backgroundColor = "#333";
          setTimeout(function() {
            window.location.href = "index.html";
          }, 3000);
        }
      }, 1000);

      function cancelLockdown() {
        cancelled = true;
        clearInterval(countdownInterval);
        document.getElementById("cancelBtn").style.display = "none";
        document.getElementById("cancelledMsg").style.display = "block";
        document.getElementById("countdown").style.color = "#00ff88";
        document.getElementById("countdown").innerText = "✓";
        document.querySelector(".strobe").style.display = "none";

        ["s1","s2","s3","s4","s5"].forEach(function(id) {
          document.getElementById(id).innerText = "SECURED ✓";
          document.getElementById(id).style.color = "#00ff88";
          document.getElementById(id).style.animation = "none";
        });

        setTimeout(function() {
          window.location.href = "dashboard.html";
        }, 3000);
      }

    </script>

  </body>
</html>
